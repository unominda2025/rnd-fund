<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quỹ Team 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; }
        h1 { text-align: center; color: #38bdf8; }
        .row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .amount { color: #2dd4bf; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>📊 TỔNG QUỸ TEAM</h1>
        <div id="data-list">Đang tải dữ liệu...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hhxsiutlbvtynkwsbkr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoeHNpdXRsYnZ0eW5rd2xzYmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMzMzMzksImV4cCI6MjA5MzYwOTMzOX0.IeopLqxMKgvmtmz7PQve0GlEp67V1leGrxo3eWVW-NU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            try {
                const { data, error } = await _supabase.from('fund_data').select('*');
                if (error) throw error;
                const list = document.getElementById('data-list');
                if (!data || data.length === 0) {
                    list.innerHTML = "Chưa có dữ liệu nào.";
                    return;
                }
                list.innerHTML = data.map(item => `
                    <div class="row">
                        <div>
                            <div>${item.content || 'Không tên'}</div>
                            <small style="color:#94a3b8">${item.category || 'Chung'}</small>
                        </div>
                        <div class="amount">${Number(item.amount).toLocaleString()}đ</div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('data-list').innerHTML = "Lỗi: " + err.message;
            }
        }
        loadData();
    </script>
</body>
</html>
